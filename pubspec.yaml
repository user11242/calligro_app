name: calligro_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  # ✅ Firebase and Google Sign-In (all versions are compatible)
  firebase_core: ^4.1.0
  firebase_auth: ^6.0.2
  cloud_firestore: ^6.0.1
  firebase_messaging: ^16.0.1
  google_sign_in: ^7.1.1
  
  # Other deps
  cupertino_icons: ^1.0.8
  phone_number: ^2.0.1
  shared_preferences: ^2.3.2
  country_code_picker: ^3.0.0
  intl_phone_field: ^3.2.0
  flutter_dotenv: ^5.1.0
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/backgrounds/
    - assets/icons/
    - .env


